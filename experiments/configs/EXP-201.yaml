experiment:
  id: "EXP-201"
  name: "マルチホップ深度アブレーション"
  category: "ablation"
  description: "analysis.max_hopsの最適値を決める。2〜3 hopsで品質が最大になるという仮説を、max_hops={1,2,3,4,5}の5条件×10論文×各3提案のSingle評価で検証する"
seed:
  paper_selection: 20260207
  evaluation_shuffle: 20260207
targets:
  paper_ids: []
  selection_strategy: "connectivity_stratified"
  candidate_scope: "dataset"
  connectivity_tier_filter: null
  count: 10
analysis:
  max_hops: 4
  top_k: 10
prompt:
  graph_format: "mermaid"
  scope: "path"
  max_paths: 10
  max_nodes: 50
  max_edges: 100
  neighbor_k: 2
  include_inline_edges: true
conditions:
  - name: "hops_1"
    method: "ideagraph"
    generation:
      num_proposals: 3
      model: "gpt-5.2-2025-12-11"
      temperature: 0.0
    analysis:
      max_hops: 1
      top_k: 10
  - name: "hops_2"
    method: "ideagraph"
    generation:
      num_proposals: 3
      model: "gpt-5.2-2025-12-11"
      temperature: 0.0
    analysis:
      max_hops: 2
      top_k: 10
  - name: "hops_3"
    method: "ideagraph"
    generation:
      num_proposals: 3
      model: "gpt-5.2-2025-12-11"
      temperature: 0.0
    analysis:
      max_hops: 3
      top_k: 10
  - name: "hops_4"
    method: "ideagraph"
    generation:
      num_proposals: 3
      model: "gpt-5.2-2025-12-11"
      temperature: 0.0
    analysis:
      max_hops: 4
      top_k: 10
  - name: "hops_5"
    method: "ideagraph"
    generation:
      num_proposals: 3
      model: "gpt-5.2-2025-12-11"
      temperature: 0.0
    analysis:
      max_hops: 5
      top_k: 10
evaluation:
  mode: "single"
  model: "gpt-5.2-2025-12-11"
  temperature: 0.0
  include_experiment: true
  include_target: false
  repeat: 1
output:
  base_dir: "experiments/runs"
