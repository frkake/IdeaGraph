experiment:
  id: "EXP-102"
  name: "IdeaGraph vs CoI-Agent"
  category: "system_effectiveness"
  description: "代表的先行手法CoI-Agentとの比較。IdeaGraphはClarityとEffectivenessで優位になるという仮説を、8論文×各3提案のPairwise+Single評価で検定する"
seed:
  paper_selection: 20260207
  evaluation_shuffle: 20260207
targets:
  paper_ids: []
  selection_strategy: "connectivity_stratified"
  connectivity_tier_filter: null
  count: 8
analysis:
  max_hops: 3
  top_k: 10
prompt:
  graph_format: "mermaid"
  scope: "path"
  max_paths: 10
  max_nodes: 50
  max_edges: 100
  neighbor_k: 2
  include_inline_edges: true
conditions:
  - name: "ideagraph_default"
    method: "ideagraph"
    generation:
      num_proposals: 3
      model: "gpt-5.2-2025-12-11"
      temperature: 0.0
  - name: "coi_baseline"
    method: "coi"
    generation:
      num_proposals: 3
      model: "gpt-5.2-2025-12-11"
      temperature: 0.0
evaluation:
  mode: "both"
  model: "gpt-5.2-2025-12-11"
  temperature: 0.0
  include_experiment: true
  include_target: false
  repeat: 1
output:
  base_dir: "experiments/runs"
