experiment:
  id: "EXP-202"
  name: "グラフ表現形式アブレーション"
  category: "ablation"
  description: "MermaidとPathsのどちらが有効かを決める。Mermaid形式がClarityで優位になるという仮説を、graph_format={mermaid,paths}の2条件×10論文×各3提案のSingle評価で検証する"
seed:
  paper_selection: 20260207
  evaluation_shuffle: 20260207
targets:
  paper_ids: []
  selection_strategy: "connectivity_stratified"
  connectivity_tier_filter: null
  count: 10
analysis:
  max_hops: 3
  top_k: 10
prompt:
  graph_format: "mermaid"
  scope: "path"
  max_paths: 10
  max_nodes: 50
  max_edges: 100
  neighbor_k: 2
  include_inline_edges: true
conditions:
  - name: "format_mermaid"
    method: "ideagraph"
    generation:
      num_proposals: 3
      model: "gpt-5.2-2025-12-11"
      temperature: 0.0
    prompt:
      graph_format: "mermaid"
      scope: "path"
      max_paths: 10
      max_nodes: 50
      max_edges: 100
      neighbor_k: 2
      include_inline_edges: true
  - name: "format_paths"
    method: "ideagraph"
    generation:
      num_proposals: 3
      model: "gpt-5.2-2025-12-11"
      temperature: 0.0
    prompt:
      graph_format: "paths"
      scope: "path"
      max_paths: 10
      max_nodes: 50
      max_edges: 100
      neighbor_k: 2
      include_inline_edges: true
evaluation:
  mode: "single"
  model: "gpt-5.2-2025-12-11"
  temperature: 0.0
  include_experiment: true
  include_target: false
  repeat: 1
output:
  base_dir: "experiments/runs"
