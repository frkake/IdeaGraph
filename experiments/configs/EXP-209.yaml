experiment:
  id: "EXP-209"
  name: "接続性効果"
  category: "comparison"
  description: "グラフの接続性が提案品質に与える影響を測り、低接続時の限界を明らかにする。connectivity_stratifiedにより高/中/低接続の3層から均等にサンプルし、集計時に層ごとのスコア差を分析する。高接続論文ほどIdeaGraphの恩恵が大きく、低接続ではDirect LLMとの差が縮小するという仮説を検証する"
seed:
  paper_selection: 20260207
  evaluation_shuffle: 20260207
targets:
  paper_ids: []
  selection_strategy: "connectivity_stratified"
  connectivity_tier_filter: null
  count: 15
analysis:
  max_hops: 3
  top_k: 10
prompt:
  graph_format: "mermaid"
  scope: "path"
  max_paths: 10
  max_nodes: 50
  max_edges: 100
  neighbor_k: 2
  include_inline_edges: true
conditions:
  - name: "ideagraph_default"
    method: "ideagraph"
    generation:
      num_proposals: 3
      model: "gpt-5.2-2025-12-11"
      temperature: 0.0
  - name: "direct_llm_baseline"
    method: "direct_llm"
    generation:
      num_proposals: 3
      model: "gpt-5.2-2025-12-11"
      temperature: 0.0
evaluation:
  mode: "both"
  model: "gpt-5.2-2025-12-11"
  temperature: 0.0
  include_experiment: true
  include_target: false
  repeat: 1
output:
  base_dir: "experiments/runs"
