experiment:
  id: "EXP-101"
  name: "IdeaGraph vs Direct LLM vs CoI-Agent"
  category: "system_effectiveness"
  description: "3手法の直接比較。IdeaGraphがNoveltyとSignificanceで優位になるという仮説を、15論文×各3提案のPairwise評価で検定する"
seed:
  paper_selection: 20260207
  evaluation_shuffle: 20260207
targets:
  paper_ids: []
  selection_strategy: "connectivity_stratified"
  candidate_scope: "dataset"
  connectivity_tier_filter: null
  count: 15
analysis:
  max_hops: 4
  top_k: 10
prompt:
  graph_format: "mermaid"
  scope: "path"
  max_paths: 10
  max_nodes: 50
  max_edges: 100
  neighbor_k: 2
  include_inline_edges: true
  include_target_paper: true
conditions:
  - name: "ideagraph"
    method: "ideagraph"
    generation:
      num_proposals: 3
      model: "gpt-5.2-2025-12-11"
      temperature: 0.0
  - name: "direct_llm"
    method: "direct_llm"
    generation:
      num_proposals: 3
      model: "gpt-5.2-2025-12-11"
      temperature: 0.0
  - name: "coi"
    method: "coi"
    generation:
      num_proposals: 3
      model: "gpt-5.2-2025-12-11"
      temperature: 0.0
evaluation:
  mode: "pairwise"
  model: "gpt-5.2-2025-12-11"
  temperature: 0.0
  include_experiment: true
  include_target: false
  repeat: 1
output:
  base_dir: "experiments/runs"
