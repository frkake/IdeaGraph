experiment:
  id: "EXP-305"
  name: "人間評価との相関"
  category: "evaluation_validity"
  description: "LLM評価が人間評価と整合するかを確認する。主要指標でr > 0.6という仮説を検証する。10論文×各3提案のLLM評価結果と、2〜3人の人間評価者による手動評価を比較し、Pearson/Spearman相関とCohen's kappaを算出する"
seed:
  paper_selection: 20260207
  evaluation_shuffle: 20260207
targets:
  paper_ids: []
  selection_strategy: "connectivity_stratified"
  candidate_scope: "dataset"
  connectivity_tier_filter: null
  count: 10
analysis:
  max_hops: 4
  top_k: 10
prompt:
  graph_format: "mermaid"
  scope: "path"
  max_paths: 10
  max_nodes: 50
  max_edges: 100
  neighbor_k: 2
  include_inline_edges: true
conditions:
  - name: "ideagraph_default"
    method: "ideagraph"
    generation:
      num_proposals: 3
      model: "gpt-5.2-2025-12-11"
      temperature: 0.0
evaluation:
  mode: "single"
  model: "gpt-5.2-2025-12-11"
  extraction_model: "gpt-5.2-2025-12-11"
  temperature: 0.0
  include_experiment: true
  include_target: false
  repeat: 1
output:
  base_dir: "experiments/runs/gpt5.2"
