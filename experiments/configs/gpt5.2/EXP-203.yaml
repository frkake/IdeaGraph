experiment:
  id: "EXP-203"
  name: "プロンプトスコープアブレーション"
  category: "ablation"
  description: "prompt.scopeの最適な範囲を決める。path_plus_k_hopは多様だがノイズが増えるという仮説を、scope={path,k_hop,path_plus_k_hop}の3条件×10論文×各3提案のSingle評価で検証する"
seed:
  paper_selection: 20260207
  evaluation_shuffle: 20260207
targets:
  paper_ids: []
  selection_strategy: "connectivity_stratified"
  candidate_scope: "dataset"
  connectivity_tier_filter: null
  count: 10
analysis:
  max_hops: 4
  top_k: 10
prompt:
  graph_format: "mermaid"
  scope: "path"
  max_paths: 10
  max_nodes: 50
  max_edges: 100
  neighbor_k: 2
  include_inline_edges: true
conditions:
  - name: "scope_path"
    method: "ideagraph"
    generation:
      num_proposals: 3
      model: "gpt-5.2-2025-12-11"
      temperature: 0.0
    prompt:
      graph_format: "mermaid"
      scope: "path"
      max_paths: 10
      max_nodes: 50
      max_edges: 100
      neighbor_k: 2
      include_inline_edges: true
  - name: "scope_k_hop"
    method: "ideagraph"
    generation:
      num_proposals: 3
      model: "gpt-5.2-2025-12-11"
      temperature: 0.0
    prompt:
      graph_format: "mermaid"
      scope: "k_hop"
      max_paths: 10
      max_nodes: 50
      max_edges: 100
      neighbor_k: 2
      include_inline_edges: true
  - name: "scope_path_plus_k_hop"
    method: "ideagraph"
    generation:
      num_proposals: 3
      model: "gpt-5.2-2025-12-11"
      temperature: 0.0
    prompt:
      graph_format: "mermaid"
      scope: "path_plus_k_hop"
      max_paths: 10
      max_nodes: 50
      max_edges: 100
      neighbor_k: 2
      include_inline_edges: true
evaluation:
  mode: "single"
  model: "gpt-5.2-2025-12-11"
  extraction_model: "gpt-5.2-2025-12-11"
  temperature: 0.0
  include_experiment: true
  include_target: false
  repeat: 1
output:
  base_dir: "experiments/runs/gpt5.2"
