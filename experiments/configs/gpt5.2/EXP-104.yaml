experiment:
  id: "EXP-104"
  name: "Direct LLM 単体評価"
  category: "system_effectiveness"
  description: "Direct LLM（グラフコンテキストなし）の絶対スコアを計測する。15論文×各1提案のSingle評価で提案品質を定量化する"
seed:
  paper_selection: 20260207
  evaluation_shuffle: 20260207
targets:
  paper_ids: []
  selection_strategy: "connectivity_stratified"
  candidate_scope: "dataset"
  connectivity_tier_filter: null
  count: 15
analysis:
  max_hops: 3
  top_k: 10
prompt:
  graph_format: "mermaid"
  scope: "path"
  max_paths: 10
  max_nodes: 50
  max_edges: 100
  neighbor_k: 2
  include_inline_edges: true
  include_target_paper: false
conditions:
  - name: "direct_llm"
    method: "direct_llm"
    generation:
      num_proposals: 1
      model: "gpt-5.2-2025-12-11"
      temperature: 0.0
evaluation:
  mode: "single"
  model: "gpt-5.2-2025-12-11"
  temperature: 0.0
  include_experiment: true
  include_target: false
  repeat: 1
output:
  base_dir: "experiments/runs/gpt5.2"
