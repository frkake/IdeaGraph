experiment:
  id: EXP-102-gpt4o
  name: 生成アイデア vs 元論文
  category: system_effectiveness
  description: 生成提案の絶対的な品質水準を校正する。元論文は上位に入るが常に1位ではないという仮説を、15論文×各1提案+1抽出のPairwise評価（include_target=true）で検定する
  visualizer_id: EXP-102
seed:
  paper_selection: 20260207
  evaluation_shuffle: 20260207
targets:
  paper_ids: []
  selection_strategy: connectivity_stratified
  candidate_scope: dataset
  connectivity_tier_filter: null
  count: 15
analysis:
  max_hops: 3
  top_k: 10
prompt:
  graph_format: mermaid
  scope: path
  include_inline_edges: true
  include_target_paper: false
conditions:
- name: ideagraph
  method: ideagraph
  generation:
    num_proposals: 1
    model: gpt-4o-2024-08-06
    temperature: 0.0
evaluation:
  mode: pairwise
  model: gpt-5.2-2025-12-11
  extraction_model: gpt-4o-2024-08-06
  temperature: 0.0
  include_experiment: true
  include_target: true
  repeat: 1
output:
  base_dir: experiments/runs/gpt4o
