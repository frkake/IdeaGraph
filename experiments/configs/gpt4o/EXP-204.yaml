experiment:
  id: "EXP-204-gpt4o"
  name: "パス数アブレーション"
  category: "ablation"
  description: "prompt.max_pathsの適正値を決める。10前後で改善が頭打ちになるという仮説を、max_paths={3,5,10,20}の4条件×10論文×各1提案のSingle評価で検証する"
  visualizer_id: "EXP-204"
seed:
  paper_selection: 20260207
  evaluation_shuffle: 20260207
targets:
  paper_ids: []
  selection_strategy: "connectivity_stratified"
  candidate_scope: "dataset"
  connectivity_tier_filter: null
  count: 10
analysis:
  max_hops: 3
  top_k: 20
prompt:
  graph_format: "mermaid"
  scope: "path"
  max_paths: 10
  max_nodes: 50
  max_edges: 100
  neighbor_k: 2
  include_inline_edges: true
conditions:
  - name: "paths_3"
    method: "ideagraph"
    generation:
      num_proposals: 1
      model: "gpt-4o-2024-08-06"
      temperature: 0.0
    prompt:
      graph_format: "mermaid"
      scope: "path"
      max_paths: 3
      max_nodes: 50
      max_edges: 100
      neighbor_k: 2
      include_inline_edges: true
  - name: "paths_5"
    method: "ideagraph"
    generation:
      num_proposals: 1
      model: "gpt-4o-2024-08-06"
      temperature: 0.0
    prompt:
      graph_format: "mermaid"
      scope: "path"
      max_paths: 5
      max_nodes: 50
      max_edges: 100
      neighbor_k: 2
      include_inline_edges: true
  - name: "paths_10"
    method: "ideagraph"
    generation:
      num_proposals: 1
      model: "gpt-4o-2024-08-06"
      temperature: 0.0
    prompt:
      graph_format: "mermaid"
      scope: "path"
      max_paths: 10
      max_nodes: 50
      max_edges: 100
      neighbor_k: 2
      include_inline_edges: true
  - name: "paths_20"
    method: "ideagraph"
    generation:
      num_proposals: 1
      model: "gpt-4o-2024-08-06"
      temperature: 0.0
    prompt:
      graph_format: "mermaid"
      scope: "path"
      max_paths: 20
      max_nodes: 50
      max_edges: 100
      neighbor_k: 2
      include_inline_edges: true
evaluation:
  mode: "single"
  model: "gpt-5.2-2025-12-11"
  extraction_model: "gpt-4o-2024-08-06"
  temperature: 0.0
  include_experiment: true
  include_target: false
  repeat: 1
output:
  base_dir: "experiments/runs/gpt4o"
