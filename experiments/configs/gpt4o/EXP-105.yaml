experiment:
  id: "EXP-105-gpt4o"
  name: "CoI-Agent 単体評価"
  category: "system_effectiveness"
  description: "CoI-Agentの絶対スコアを計測する。15論文×各3提案のSingle評価で提案品質を定量化する"
  visualizer_id: "EXP-105"
seed:
  paper_selection: 20260207
  evaluation_shuffle: 20260207
targets:
  paper_ids: []
  selection_strategy: "connectivity_stratified"
  candidate_scope: "dataset"
  connectivity_tier_filter: null
  count: 15
analysis:
  max_hops: 4
  top_k: 10
prompt:
  graph_format: "mermaid"
  scope: "path"
  max_paths: 10
  max_nodes: 50
  max_edges: 100
  neighbor_k: 2
  include_inline_edges: true
  include_target_paper: false
conditions:
  - name: "coi"
    method: "coi"
    generation:
      num_proposals: 3
      model: "gpt-4o-2024-08-06"
      temperature: 0.0
evaluation:
  mode: "single"
  model: "gpt-5.2-2025-12-11"
  temperature: 0.0
  include_experiment: true
  include_target: false
  repeat: 1
output:
  base_dir: "experiments/runs/gpt4o"
