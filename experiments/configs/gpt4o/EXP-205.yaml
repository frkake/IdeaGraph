experiment:
  id: "EXP-205-gpt4o"
  name: "グラフサイズ効果"
  category: "ablation"
  description: "グラフ規模が品質に与える影響を測る。規模が大きいほど品質は上がるが改善幅は逓減するという仮説を検証する。グラフを--limit={20,50,100,full}で再構築し、最小グラフに存在する5論文で再実行する。手動で複数回実行が必要"
  visualizer_id: "EXP-205"
seed:
  paper_selection: 20260207
  evaluation_shuffle: 20260207
targets:
  paper_ids:
    # NOTE: 最小グラフ(--limit 20)構築後に実在IDで置換すること
    # 全グラフサイズに共通して存在する5論文を選定する
    - "PLACEHOLDER_PAPER_1"
    - "PLACEHOLDER_PAPER_2"
    - "PLACEHOLDER_PAPER_3"
    - "PLACEHOLDER_PAPER_4"
    - "PLACEHOLDER_PAPER_5"
  selection_strategy: "manual"
  candidate_scope: "dataset"
  connectivity_tier_filter: null
  count: 5
analysis:
  max_hops: 3
  top_k: 10
prompt:
  graph_format: "mermaid"
  scope: "path"
  max_paths: 10
  max_nodes: 50
  max_edges: 100
  neighbor_k: 2
  include_inline_edges: true
conditions:
  - name: "ideagraph_default"
    method: "ideagraph"
    generation:
      num_proposals: 1
      model: "gpt-4o-2024-08-06"
      temperature: 0.0
evaluation:
  mode: "single"
  model: "gpt-5.2-2025-12-11"
  extraction_model: "gpt-4o-2024-08-06"
  temperature: 0.0
  include_experiment: true
  include_target: false
  repeat: 1
output:
  base_dir: "experiments/runs/gpt4o"
