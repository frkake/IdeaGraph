experiment:
  id: "EXP-207-gpt4o"
  name: "品質-コスト効率"
  category: "ablation"
  description: "品質改善が計算コストに見合うかを示す。一定以上のコンテキスト量では費用対効果が悪化するという仮説を、max_paths/max_nodes={5/25,10/50,20/100}の3条件×10論文×各3提案のSingle評価+実行ログで検証し、Pareto frontierを作成する"
  visualizer_id: "EXP-207"
seed:
  paper_selection: 20260207
  evaluation_shuffle: 20260207
targets:
  paper_ids: []
  selection_strategy: "connectivity_stratified"
  candidate_scope: "dataset"
  connectivity_tier_filter: null
  count: 10
analysis:
  max_hops: 4
  top_k: 20
prompt:
  graph_format: "mermaid"
  scope: "path"
  max_paths: 10
  max_nodes: 50
  max_edges: 100
  neighbor_k: 2
  include_inline_edges: true
conditions:
  - name: "small_5paths_25nodes"
    method: "ideagraph"
    generation:
      num_proposals: 3
      model: "gpt-4o-2024-08-06"
      temperature: 0.0
    prompt:
      graph_format: "mermaid"
      scope: "path"
      max_paths: 5
      max_nodes: 25
      max_edges: 50
      neighbor_k: 2
      include_inline_edges: true
  - name: "medium_10paths_50nodes"
    method: "ideagraph"
    generation:
      num_proposals: 3
      model: "gpt-4o-2024-08-06"
      temperature: 0.0
    prompt:
      graph_format: "mermaid"
      scope: "path"
      max_paths: 10
      max_nodes: 50
      max_edges: 100
      neighbor_k: 2
      include_inline_edges: true
  - name: "large_20paths_100nodes"
    method: "ideagraph"
    generation:
      num_proposals: 3
      model: "gpt-4o-2024-08-06"
      temperature: 0.0
    prompt:
      graph_format: "mermaid"
      scope: "path"
      max_paths: 20
      max_nodes: 100
      max_edges: 200
      neighbor_k: 2
      include_inline_edges: true
evaluation:
  mode: "single"
  model: "gpt-5.2-2025-12-11"
  extraction_model: "gpt-4o-2024-08-06"
  temperature: 0.0
  include_experiment: true
  include_target: false
  repeat: 1
output:
  base_dir: "experiments/runs/gpt4o"
