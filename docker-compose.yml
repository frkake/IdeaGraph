services:
  neo4j:
    image: neo4j:5.26-community
    container_name: idea-graph-neo4j
    ports:
      - "7474:7474"  # HTTP (Browser)
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      # NOTE:
      # 既定値を大きくしすぎると（例: 16G/16G）WSL2 やメモリが小さい環境で Neo4j が起動失敗し、
      # Bolt(7687) への接続が Connection refused になります。
      # 必要なら .env で NEO4J_HEAP_MAX / NEO4J_PAGECACHE_SIZE を上書きしてください。
      - NEO4J_server_memory_heap_max__size=${NEO4J_HEAP_MAX:-4G}
      - NEO4J_server_memory_pagecache_size=${NEO4J_PAGECACHE_SIZE:-4G}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
