<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdeaGraph - AI論文ナレッジグラフ</title>
    <script src="https://unpkg.com/neovis.js@2.1.0"></script>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>IdeaGraph</h1>
            <!-- タブナビゲーション -->
            <div class="nav-tabs">
                <button class="nav-tab active" data-tab="explore">探索</button>
                <button class="nav-tab" data-tab="analyze">分析</button>
                <button class="nav-tab" data-tab="propose">提案</button>
                <button class="nav-tab" data-tab="history">履歴</button>
            </div>
            <!-- 凡例 -->
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-dot" style="background: #4A90D9;"></div>
                    <span>Paper</span>
                </div>
                <div class="legend-item">
                    <div class="legend-diamond" style="background: #FF9800;"></div>
                    <span>Method</span>
                </div>
                <div class="legend-item">
                    <div class="legend-diamond" style="background: #9C27B0;"></div>
                    <span>Dataset</span>
                </div>
                <div class="legend-item">
                    <div class="legend-diamond" style="background: #00BCD4;"></div>
                    <span>Benchmark</span>
                </div>
                <div class="legend-item">
                    <div class="legend-diamond" style="background: #E91E63;"></div>
                    <span>Task</span>
                </div>
                <span style="margin-left: 0.5rem; color: #666;">|</span>
                <div class="legend-item">
                    <div class="legend-line" style="background: #FF5722;"></div>
                    <span>Extends</span>
                </div>
                <div class="legend-item">
                    <div class="legend-line" style="background: #2196F3;"></div>
                    <span>Compares</span>
                </div>
                <div class="legend-item">
                    <div class="legend-line" style="background: #4CAF50;"></div>
                    <span>Uses</span>
                </div>
            </div>
        </header>

        <div class="main">
            <!-- 左サイドバー -->
            <div class="sidebar">
                <!-- クイックフィルター -->
                <div class="section">
                    <h2>クイックフィルター</h2>
                    <div class="filter-buttons">
                        <button class="btn-paper" onclick="filterBy('all')">全て</button>
                        <button class="btn-paper" onclick="filterBy('papers')">Papers</button>
                        <button class="btn-method" onclick="filterBy('method')">Methods</button>
                        <button class="btn-dataset" onclick="filterBy('dataset')">Datasets</button>
                        <button class="btn-benchmark" onclick="filterBy('benchmark')">Benchmarks</button>
                        <button class="btn-task" onclick="filterBy('task')">Tasks</button>
                        <button class="btn-cites" onclick="filterBy('cites')">引用関係</button>
                        <button class="btn-mentions" onclick="filterBy('mentions')">言及関係</button>
                    </div>
                </div>

                <!-- キーワード検索 -->
                <div class="section">
                    <h2>キーワード検索</h2>
                    <div class="search-row">
                        <input type="text" id="keyword" placeholder="論文タイトルやEntity名...">
                        <button onclick="searchKeyword()">検索</button>
                    </div>
                </div>

                <!-- Cypherクエリ -->
                <div class="section">
                    <h2>Cypher クエリ</h2>
                    <textarea id="query" rows="3">MATCH (p:Paper)-[r]->(n) RETURN p, r, n LIMIT 50</textarea>
                    <button class="full-width" onclick="runQuery()">クエリ実行</button>
                </div>

                <!-- マルチホップ分析 -->
                <div class="section">
                    <h2>マルチホップ分析</h2>
                    <label for="paperId">論文ID</label>
                    <input type="text" id="paperId" placeholder="ノードをクリックで自動入力">
                    <label for="hopK">ホップ数</label>
                    <input type="number" id="hopK" value="2" min="1" max="5">
                    <button class="full-width secondary" onclick="runAnalysis()">分析実行</button>
                </div>

                <!-- ノード詳細 -->
                <div id="nodeInfo" class="node-info" style="display: none;">
                    <h3>選択ノード</h3>
                    <div id="nodeDetails"></div>
                </div>

                <!-- エッジ詳細 -->
                <div id="edgeInfo" class="edge-info" style="display: none;">
                    <h3>引用関係詳細</h3>
                    <div id="edgeDetails"></div>
                </div>
            </div>

            <!-- グラフエリア -->
            <div id="graph"></div>

            <!-- 右パネル（分析結果・提案） -->
            <div id="rightPanel" class="right-panel" style="display: none;">
                <div class="right-panel-header">
                    <h3>分析結果</h3>
                    <button class="toggle-panel-btn" onclick="toggleRightPanel()" title="パネルを閉じる">
                        ✕
                    </button>
                </div>
                <div id="rightPanelContent" class="right-panel-content">
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <div class="empty-state-text">分析結果がありません<br>論文を選択して分析を実行してください</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="status">
            <span id="status">準備完了</span>
            <span id="stats"></span>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
